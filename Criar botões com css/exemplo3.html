<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - 005</title>
    <style>
        fieldset{
            border: 2px solid black;
            border-radius: 5px;
            background-color: rgb(225, 222, 222);
            box-shadow: 2px 2px 5px rgba(0,0,0,400);
            margin-top: 8px;
        }
        legend {
            color: white;
            font-weight: bolder;
            background-color: rgb(43, 43, 43);
            border-radius: 5px;
            padding-left: 10px;
            padding-right: 10px;
        }

        .botao-personalizado-enviar {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
        .botao-personalizado-enviar:hover {            
            transform: translate(-2px, -2px);
            box-shadow: 2px 2px 5px rgba(0,0,0, 0.623);
        }
        .botao-personalizado-enviar:active {
            background-color: #3e8e41;
            box-shadow: 0px 0px 0px rgba(0,0,0, 0.623);
            transform: translate(2px, 2px);
        }

        .botao-personalizado-limpar {
            background-color: #acb506;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
        .botao-personalizado-limpar:hover {            
            transform: translate(-2px, -2px);
            box-shadow: 2px 2px 5px rgba(0,0,0, 0.623);
        }
        .botao-personalizado-limpar:active {
            background-color: #cac40c;
            box-shadow: 0px 0px 0px rgba(0,0,0, 0.623);
            transform: translate(2px, 2px);
        }

        .botao-personalizado-cancelar {
            background-color: #c31b05;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
        .botao-personalizado-cancelar:hover {            
            transform: translate(-2px, -2px);
            box-shadow: 2px 2px 5px rgba(0,0,0, 0.623);
            
        }
        .botao-personalizado-cancelar:active {
            background-color: #f81403;
            box-shadow: 0px 0px 0px rgba(0,0,0, 0.623);
            transform: translate(2px, 2px);
        }
    </style>
</head>
<body>
    <h1> Exemplo de Formulário 005</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend> Sexo </legend>
            <input type="radio" name="sexo" id="isexomasculino"  value="M" checked> 
            <label for="isexomasculino"> Masculino </label> <br>
            <input type="radio" name="sexo" id="isexofeminino" value="F">
            <label for="isexofeminino"> Feminino </label> <br>
        </fieldset>
        <fieldset> 
            <legend> Esportes Favoridos </legend>
            <input type="checkbox" name="esportebasquete" id="iesportebasquete"> 
            <label for="iesportebasquete"> Basquete </label>  <br>

            <input type="checkbox" name="esportefutebol" id="iesportefutebol"> 
            <label for="iesportefutebol"> Futebol </label> <br>

            <input type="checkbox" name="esportenatacao" id="iesportenatacao" checked> 
            <label for="iesportenatacao"> Natação </label>  <br>

            <input type="checkbox" name="esportebasquete" id="iesportetenis"> 
            <label for="iesportetenis"> Tênis </label> <br>

            <input type="checkbox" name="esportecorrida" id="iesportecorrida" checked>
            <label for="iesportecorrida"> Corrida </label> <br>
        </fieldset>

        <p style="text-align: center;">
            <input type="submit" class="botao-personalizado-enviar" value="Enviar">
            <input type="reset" class="botao-personalizado-limpar" value="Limpar">
            <input type="reset" class="botao-personalizado-cancelar" value="Cancelar">
        </p>        
    </form>
</body>
</html>
